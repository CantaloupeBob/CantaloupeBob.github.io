<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <link rel="icon" type="image/svg+xml" href="./cat-pfp.jpg" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Cantaloupe Bob</title>
        <!--
      Prevents a flash of the wrong theme on load.
      Reads the persisted Zustand store value from localStorage before React
      mounts, and applies the `dark` class immediately if needed.
    -->
        <script>
            (function () {
                try {
                    var stored = localStorage.getItem("portfolio-theme");
                    var theme = stored ? JSON.parse(stored).state?.theme : null;
                    if (!theme) {
                        theme = window.matchMedia(
                            "(prefers-color-scheme: dark)",
                        ).matches
                            ? "dark"
                            : "light";
                    }
                    if (theme === "dark") {
                        document.documentElement.classList.add("dark");
                    }
                } catch (e) {}
            })();
        </script>
    </head>
    <body>
        <div id="root"></div>
        <script type="module" src="/src/main.tsx"></script>
    </body>
</html>
